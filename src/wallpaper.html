<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>Crystal Snow — Wallpaper</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

html {
  zoom: reset;
  -webkit-text-size-adjust: 100%;
}



    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    #scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(180deg, #04060f 0%, #080e20 30%, #0b1530 55%, #111f4a 78%, #1a2e60 100%);
    }

    .star {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      animation: twinkle ease-in-out infinite alternate;
    }

    @keyframes twinkle {
      0%   { opacity: 0.08; }
      100% { opacity: 0.95; }
    }

    #flake-layer {
      position: absolute;
      inset: 0;
      transform-origin: 50% 0;
      z-index: 3;
      will-change: transform;
    }

    .flake {
      position: absolute;
      top: -40px;
      opacity: 0;
      animation: fall linear infinite, sway ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
      6%   { opacity: var(--max-op); }
      90%  { opacity: var(--max-op); }
      100% { transform: translateY(110vh) rotate(var(--spin)); opacity: 0; }
    }

    @keyframes sway {
      0%   { margin-left: 0; }
      100% { margin-left: var(--sway); }
    }

    .flake svg { display: block; }

    .flake.glow svg {
      animation: glowpulse 2.2s ease-in-out infinite alternate;
    }

    @keyframes glowpulse {
      0%   { filter: drop-shadow(0 0 3px rgba(160,215,255,0.4)); }
      100% { filter: drop-shadow(0 0 11px rgba(200,235,255,1)); }
    }

    #moon-wrap {
      position: absolute;
      top: 48px;
      right: 80px;
      width: 90px;
      height: 90px;
      z-index: 20;
      will-change: transform;
      transform: translateZ(0);
    }

    #trees {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      width: 100%;
      height: 120px;
      z-index: 5;
      will-change: transform;
      transform: translateZ(0);
    }

    #ground {
      position: absolute;
      bottom: 0;
      left: -5%;
      right: -5%;
      height: 80px;
      background: linear-gradient(180deg, #bcdff7 0%, #dff0ff 100%);
      border-radius: 50% 50% 0 0 / 30px 30px 0 0;
      z-index: 4;
      will-change: transform;
      transform: translateZ(0);
    }

    #ground::before {
      content: '';
      position: absolute;
      top: -10px;
      left: 12%;
      right: 12%;
      height: 20px;
      background: rgba(215,238,255,0.5);
      border-radius: 50%;
    }

    #wind-label {
      position: absolute;
      top: 18px;
      left: 20px;
      font-size: 12px;
      font-family: sans-serif;
      color: rgba(160,200,255,0.0);
      letter-spacing: 0.1em;
      transition: color 0.5s ease;
      user-select: none;
      z-index: 10;
    }

    #wind-label.active { color: rgba(160,200,255,0.55); }
  </style>
</head>
<body>
<div id="scene">

  <svg id="moon-wrap" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
    <circle cx="45" cy="45" r="44" fill="rgba(190,225,255,0.03)"/>
    <circle cx="45" cy="45" r="37" fill="rgba(190,225,255,0.05)"/>
    <circle cx="45" cy="45" r="29" fill="rgba(195,228,255,0.08)"/>
    <circle cx="45" cy="45" r="20" fill="rgba(205,232,255,0.14)"/>
    <circle cx="45" cy="45" r="14" fill="#cce6ff"/>
    <circle cx="52" cy="42" r="12.5" fill="#0b1530"/>
    <circle cx="34" cy="40" r="2"   fill="rgba(140,195,235,0.32)"/>
    <circle cx="39" cy="48" r="1.2" fill="rgba(140,195,235,0.26)"/>
    <circle cx="30" cy="47" r="1"   fill="rgba(140,195,235,0.20)"/>
  </svg>

  <div id="flake-layer"></div>
  <div id="ground"></div>

  <svg id="trees" viewBox="0 0 1000 100" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
    <style>.tr{fill:#060c1c}.sn{fill:rgba(200,235,255,0.65)}</style>
    <polygon class="tr" points="30,95 52,32 74,95"/>
    <polygon class="tr" points="46,95 68,16 90,95"/>

    <ellipse  class="sn" cx="68" cy="17" rx="10" ry="5.5"/>
    <polygon class="tr" points="100,95 118,42 136,95"/>
    <polygon class="tr" points="116,95 136,24 156,95"/>
    <ellipse  class="sn" cx="136" cy="25" rx="9" ry="5"/>
    <polygon class="tr" points="220,95 240,36 260,95"/>
    <polygon class="tr" points="238,95 258,14 278,95"/>
    <polygon class="sn" points="258,14 278,95 238,95 258,36"/>
    <ellipse  class="sn" cx="258" cy="15" rx="10" ry="5.5"/>
    <polygon class="tr" points="340,95 358,44 376,95"/>
    <polygon class="tr" points="357,95 376,26 395,95"/>
    <ellipse  class="sn" cx="376" cy="27" rx="9" ry="5"/>
    <polygon class="tr" points="460,95 480,33 500,95"/>
    <polygon class="tr" points="478,95 499,14 520,95"/>
    <polygon class="sn" points="499,14 520,95 478,95 499,33"/>
    <ellipse  class="sn" cx="499" cy="15" rx="11" ry="5.5"/>
    <polygon class="tr" points="570,95 588,45 606,95"/>
    <polygon class="tr" points="587,95 605,28 623,95"/>
    <ellipse  class="sn" cx="605" cy="29" rx="9" ry="5"/>
    <polygon class="tr" points="670,95 690,36 710,95"/>
    <polygon class="tr" points="688,95 708,18 728,95"/>
    <polygon class="sn" points="708,18 728,95 688,95 708,36"/>
    <ellipse  class="sn" cx="708" cy="19" rx="10" ry="5.5"/>
    <polygon class="tr" points="770,95 788,47 806,95"/>
    <polygon class="tr" points="786,95 805,30 824,95"/>
    <ellipse  class="sn" cx="805" cy="31" rx="9" ry="5"/>
    <polygon class="tr" points="870,95 888,38 906,95"/>
    <polygon class="tr" points="886,95 905,20 924,95"/>
    <polygon class="sn" points="905,20 924,95 886,95 905,38"/>
    <ellipse  class="sn" cx="905" cy="21" rx="10" ry="5.5"/>
    <polygon class="tr" points="940,95 956,50 972,95"/>
    <polygon class="tr" points="954,95 970,34 986,95"/>
    <ellipse  class="sn" cx="970" cy="35" rx="8" ry="4.5"/>
  </svg>

  <div id="wind-label">&#x2B0C; wind gust</div>

</div>

<script>
  const scene     = document.getElementById('scene');
  const layer     = document.getElementById('flake-layer');
  const windLabel = document.getElementById('wind-label');
  const flakes    = [];

  const INTENSITY = {
    flurries: { count: 15, durMin: 10, durMax: 18, swayMax: 30,  spinMax: 120, glowChance: 0.1  },
    showers:  { count: 30, durMin: 7,  durMax: 14, swayMax: 45,  spinMax: 160, glowChance: 0.15 },
    blowing:  { count: 50, durMin: 5,  durMax: 10, swayMax: 70,  spinMax: 200, glowChance: 0.18 },
    squalls:  { count: 65, durMin: 4,  durMax: 8,  swayMax: 100, spinMax: 240, glowChance: 0.20 },
    blizzard: { count: 85, durMin: 3,  durMax: 6,  swayMax: 130, spinMax: 300, glowChance: 0.22 },
  };

  const params    = new URLSearchParams(window.location.search);
  const intensity = INTENSITY[params.get('intensity')] || INTENSITY.blowing;

  function rand(a, b) { return a + Math.random() * (b - a); }

  function buildStars(n) {
    for (let i = 0; i < n; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = rand(1, 2.8);
      s.style.cssText = `width:${sz}px;height:${sz}px;left:${rand(0,100)}%;top:${rand(0,62)}%;animation-duration:${rand(1.4,4.4)}s;animation-delay:-${rand(0,4)}s;`;
      scene.insertBefore(s, scene.querySelector('#flake-layer'));
    }
  }

  function makeFlakeSVG(size, color) {
    const cx = size/2, cy = size/2, r = size/2 - 1;
    let p = '';
    for (let i = 0; i < 6; i++) {
      const a    = (i/6) * Math.PI * 2;
      const x2   = cx + r * Math.cos(a), y2 = cy + r * Math.sin(a);
      const sw   = Math.max(0.8, size * 0.08);
      const sw2  = Math.max(0.6, size * 0.06);
      const m30x = cx + (r*0.3)*Math.cos(a);
      const m30y = cy + (r*0.3)*Math.sin(a);
      p += `<line x1="${cx}" y1="${cy}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="${sw}" stroke-linecap="round"/>`;
      p += `<line x1="${m30x}" y1="${m30y}" x2="${cx+(r*0.45)*Math.cos(a-0.55)}" y2="${cy+(r*0.45)*Math.sin(a-0.55)}" stroke="${color}" stroke-width="${sw2}" stroke-linecap="round"/>`;
      p += `<line x1="${m30x}" y1="${m30y}" x2="${cx+(r*0.45)*Math.cos(a+0.55)}" y2="${cy+(r*0.45)*Math.sin(a+0.55)}" stroke="${color}" stroke-width="${sw2}" stroke-linecap="round"/>`;
    }
    p += `<circle cx="${cx}" cy="${cy}" r="${Math.max(1,size*0.1)}" fill="${color}"/>`;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">${p}</svg>`;
  }

  function createFlake() {
    const el    = document.createElement('div');
    el.className = 'flake';
    const size  = rand(8, 34);
    const dur   = rand(intensity.durMin, intensity.durMax);
    const delay = rand(0, dur);
    const sway  = (Math.random() > 0.5 ? 1 : -1) * rand(10, intensity.swayMax);
    const spin  = (Math.random() > 0.5 ? 1 : -1) * rand(40, intensity.spinMax);
    const maxOp = rand(0.4, 1.0);
    const isGlow = Math.random() < intensity.glowChance;
    const palette = ['#ffffff','#daeeff','#c5e4ff','#e8f5ff','#b8d8f8','#cfe9ff'];
    const color = palette[Math.floor(Math.random() * palette.length)];
    el.innerHTML = makeFlakeSVG(size, color);
    if (isGlow) el.classList.add('glow');
    el.style.cssText = `left:${rand(-2,102)}%;animation-duration:${dur}s,${rand(2,6)}s;animation-delay:-${delay}s,-${rand(0,4)}s;--sway:${sway}px;--spin:${spin}deg;--max-op:${maxOp};`;
    return el;
  }

  function rebuild(count) {
    flakes.forEach(f => f.remove());
    flakes.length = 0;
    for (let i = 0; i < count; i++) {
      const f = createFlake();
      layer.appendChild(f);
      flakes.push(f);
    }
  }

  let currentSkew = 0, targetSkew = 0, gustRaf = null, gustLock = false;

  function animSkew() {
    const diff = targetSkew - currentSkew;
    currentSkew += diff * 0.055;
    layer.style.transform = `skewX(${currentSkew.toFixed(3)}deg)`;
    if (Math.abs(diff) > 0.015) {
      gustRaf = requestAnimationFrame(animSkew);
    } else {
      currentSkew = targetSkew;
      layer.style.transform = `skewX(${currentSkew}deg)`;
      if (targetSkew === 0) gustLock = false;
    }
  }

  function triggerGust() {
    if (gustLock) return;
    gustLock = true;
    targetSkew = (Math.random() > 0.5 ? 1 : -1) * rand(4, 9);
    windLabel.classList.add('active');
    cancelAnimationFrame(gustRaf);
    animSkew();
    setTimeout(() => {
      targetSkew = 0;
      windLabel.classList.remove('active');
      animSkew();
    }, rand(1000, 2500));
  }

  function scheduleGust() {
    setTimeout(() => { triggerGust(); scheduleGust(); }, rand(4500, 11000));
  }

  window.addEventListener('wheel', e => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
  window.addEventListener('keydown', e => { if (e.ctrlKey && ['+','-','0'].includes(e.key)) e.preventDefault(); });

  buildStars(65);
  rebuild(intensity.count);
  scheduleGust();
</script>
</body>
</html>
